<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="icon" href="./images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./weather.css">
</head>

<body>

    
    <div class="container">
        
        <div class="video-container">
            <video autoplay loop playsinline preload="auto" id="bg-video" onplay="this.playbackRate = 1.0;">
            <source src="./videos/background-video-Clear.mp4" type="video/mp4">
        </video>

        </div>

        <div class="bar">
            <p id="clear">x</p>
            <input id="input" type="text" placeholder="Enter the city name" spellcheck="false">

            <i id="search-btn" class="fa-solid fa-magnifying-glass" style="color: rgb(117, 113, 113);"></i>
        </div>

        <div class="img">
            <img id="weather-icon" src="./images/clear.svg" alt="weather" height="150px">
        </div>
        <h3 id="time-status"></h3>
        <h3 id="weathercondition"></h3>
        <div class="weather">
            <h1 id="temp">°C</h1>
        </div>

        <h1 id="cityname"></h1>
        <h3 id="country"></h3>
        <div class="smallicon">
            <img src="./images/water-solid (1).png" alt="humidity" height="30px" width="40px">
            <img src="./images/wind-solid.png" alt="humidity" height="30px" width="40px">
        </div>

        <div class="info">
            <p id="humidity">--%</p>
            <p id="wind">-- km/h </p>
        </div>
        <div class="bottom">
            <h4>Humidity</h4>
            <h4>Wind Speed</h4>
        </div>

        <div class="sun-times">
        <div>
            <p>Sunrise</p>
            <span id="sunrise-time">--:--</span>
        </div>
    
        <div>
            <p>Sunset</p>
            <span id="sunset-time">--:--</span>
        </div>
    </div>
    </div>


    <script src="./weather.js"></script>
</body>

</html>
